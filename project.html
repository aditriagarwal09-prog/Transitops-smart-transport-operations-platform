<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps · Fleet Operations Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-side">
      <div class="brand-mark"><span class="dot"></span><span>TRANSITOPS</span></div>
      <div class="tagline">Every vehicle, driver and mile — <em>on one board.</em></div>
      <div class="board-strip" id="login-board"></div>
    </div>
    <div class="login-form">
      <h2>Sign in to operations</h2>
      <p class="sub">Role-based access · fleet, dispatch, safety &amp; finance</p>
      <div class="err-msg" id="login-err">Invalid email or password.</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@transitops.io" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block" onclick="attemptLogin()">Sign in →</button>
      <div class="quick">
        Demo accounts (password: <span class="mono">demo1234</span>)
        <div class="quick-roles" id="quick-roles"></div>
      </div>
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-mark"><span class="dot"></span><span>TRANSITOPS</span></div>
      <nav id="nav-list"></nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <div class="avatar" id="side-avatar">A</div>
          <div class="info">
            <div class="name" id="side-name">—</div>
            <div class="role" id="side-role">—</div>
          </div>
          <button class="icon-btn" title="Toggle theme" onclick="toggleTheme()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>
          </button>
          <button class="icon-btn" title="Log out" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
          </button>
        </div>
      </div>
    </aside>
    <main class="main" id="main-content"></main>
  </div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<!--
  API_BASE points at the TransitOps backend (see /backend in this repo).
  Change this if your API is deployed somewhere other than localhost:4000.
-->
<script>window.TRANSITOPS_API_BASE = "http://localhost:4000/api";</script>
<script src="script.js"></script>
</body>
</html>
